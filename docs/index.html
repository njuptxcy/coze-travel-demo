<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商旅费控智能体 Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 188, 137, 0.24), transparent 26%),
          radial-gradient(circle at bottom right, rgba(92, 145, 255, 0.16), transparent 22%),
          linear-gradient(180deg, #f7f1e8 0%, #efe8dc 100%);
      }

      .workspace {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .chat-window {
        position: fixed;
        top: 40px;
        right: 40px;
        width: 430px;
        height: 760px;
        min-width: 360px;
        min-height: 520px;
        max-width: calc(100vw - 24px);
        max-height: calc(100vh - 24px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(28, 31, 39, 0.1);
        border-radius: 24px;
        background: rgba(255, 252, 246, 0.9);
        box-shadow: 0 26px 70px rgba(28, 29, 33, 0.16);
        backdrop-filter: blur(10px);
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        height: 56px;
        padding: 0 14px 0 16px;
        border-bottom: 1px solid rgba(28, 31, 39, 0.08);
        background: linear-gradient(135deg, rgba(255, 249, 242, 0.96), rgba(243, 248, 255, 0.96));
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .chat-header.dragging {
        cursor: grabbing;
      }

      .chat-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .chat-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #47a06d;
        flex: 0 0 auto;
      }

      .chat-title-text {
        min-width: 0;
      }

      .chat-title-text strong {
        display: block;
        color: #1f2330;
        font-size: 15px;
        line-height: 1.2;
      }

      .chat-title-text span {
        display: block;
        margin-top: 2px;
        color: #6b6f7b;
        font-size: 12px;
        line-height: 1.2;
      }

      .chat-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .chat-actions button {
        appearance: none;
        border: 1px solid rgba(28, 31, 39, 0.1);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        color: #2f3442;
        padding: 8px 12px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .chat-body {
        position: relative;
        flex: 1;
        min-height: 0;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.76);
      }

      #coze-chat-sdk {
        width: 100%;
        height: 100%;
      }

      #coze-chat-sdk > * {
        width: 100% !important;
        height: 100% !important;
      }

      .resize-tip {
        position: absolute;
        right: 12px;
        bottom: 10px;
        z-index: 2;
        pointer-events: none;
        color: rgba(79, 83, 94, 0.5);
        font-size: 11px;
      }

      .resize-handle {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 28px;
        height: 28px;
        z-index: 5;
        cursor: nwse-resize;
        touch-action: none;
      }

      .resize-handle::before {
        content: "";
        position: absolute;
        right: 6px;
        bottom: 6px;
        width: 12px;
        height: 12px;
        border-right: 2px solid rgba(79, 83, 94, 0.45);
        border-bottom: 2px solid rgba(79, 83, 94, 0.45);
        border-radius: 0 0 4px 0;
      }

      .page-tip {
        position: fixed;
        left: 16px;
        bottom: 16px;
        max-width: min(340px, calc(100vw - 32px));
        padding: 12px 14px;
        border: 1px solid rgba(28, 31, 39, 0.08);
        border-radius: 16px;
        color: #5d5447;
        background: rgba(255, 252, 246, 0.84);
        box-shadow: 0 14px 34px rgba(35, 31, 26, 0.1);
        font-size: 13px;
        line-height: 1.6;
        backdrop-filter: blur(12px);
      }

      .page-tip strong {
        display: block;
        margin-bottom: 4px;
        color: #28231e;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        body {
          overflow: auto;
        }

        .chat-window {
          position: relative;
          top: auto;
          right: auto;
          width: 100vw;
          height: 100vh;
          min-width: 0;
          min-height: 100vh;
          max-width: none;
          max-height: none;
          border-radius: 0;
        }

        .chat-header {
          cursor: default;
        }

        .page-tip {
          display: none;
        }

        .resize-handle,
        .resize-tip {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="workspace">
      <section class="chat-window" id="chat-window">
        <header class="chat-header" id="drag-handle">
          <div class="chat-title">
            <span class="chat-dot"></span>
            <div class="chat-title-text">
              <strong>商旅费控智能体</strong>
              <span>现在拖动的是这个真实聊天窗口</span>
            </div>
          </div>
          <div class="chat-actions">
            <button type="button" id="reset-window">复位</button>
          </div>
        </header>
        <div class="chat-body">
          <div id="coze-chat-sdk"></div>
          <div class="resize-tip">右下角可拖动改大小</div>
          <div class="resize-handle" id="resize-handle" aria-hidden="true"></div>
        </div>
      </section>
    </div>

    <div class="page-tip">
      <strong>当前模式</strong>
      这是嵌入式聊天窗口，不再使用右下角浮球弹窗。桌面端可拖动、可改大小。
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
    <script>
      const mountEl = document.getElementById("coze-chat-sdk");
      const chatWindow = document.getElementById("chat-window");
      const dragHandle = document.getElementById("drag-handle");
      const resetButton = document.getElementById("reset-window");
      const resizeHandle = document.getElementById("resize-handle");
      const desktopMedia = window.matchMedia("(min-width: 769px)");
      const sdk = window.CozeWebSDK || window.CozeWebSDKmain;

      if (!sdk || !sdk.WebChatClient) {
        mountEl.innerHTML =
          '<div style="padding:24px;color:#8b4b15;">Chat SDK 加载失败，请检查网络或浏览器控制台。</div>';
        throw new Error("Coze Chat SDK is not available on window.");
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function syncEmbeddedRoot() {
        const firstChild = mountEl.firstElementChild;
        if (!firstChild) {
          return;
        }

        firstChild.style.width = "100%";
        firstChild.style.height = "100%";
        firstChild.style.maxWidth = "100%";
        firstChild.style.maxHeight = "100%";
      }

      const observer = new MutationObserver(function () {
        syncEmbeddedRoot();
      });

      observer.observe(mountEl, {
        childList: true,
        subtree: true,
      });

      const chatClient = new sdk.WebChatClient({
        config: {
          type: "bot",
          bot_id: "7622561335737532470",
          isIframe: false,
        },
        auth: {
          type: "token",
          token: "pat_orpMRBmtF3AxM0MemoyRUUiIF4BoN1qVmvRyoKAlOcd4Ci3c0jpv9pE5JnT82H1c",
          onRefreshToken: function () {
            return "pat_orpMRBmtF3AxM0MemoyRUUiIF4BoN1qVmvRyoKAlOcd4Ci3c0jpv9pE5JnT82H1c";
          },
        },
        ui: {
          base: {
            layout: "pc",
            lang: "zh-CN",
            zIndex: 1000,
          },
          header: {
            isShow: false,
            isNeedClose: false,
          },
          asstBtn: {
            isNeed: false,
          },
          conversations: {
            isNeed: true,
          },
          footer: {
            isShow: false,
          },
          chatBot: {
            title: "商旅费控智能体",
            uploadable: true,
            width: 430,
            el: mountEl,
            isNeedAddNewConversation: true,
            isNeedFunctionCallMessage: true,
            isNeedQuote: true,
          },
        },
      });

      if (chatClient && typeof chatClient.showChatBot === "function") {
        chatClient.showChatBot();
      }

      window.setTimeout(syncEmbeddedRoot, 600);
      window.setTimeout(syncEmbeddedRoot, 1500);
      window.setTimeout(syncEmbeddedRoot, 3000);

      function resetWindow() {
        if (!desktopMedia.matches) {
          chatWindow.style.left = "";
          chatWindow.style.top = "";
          chatWindow.style.right = "";
          chatWindow.style.width = "";
          chatWindow.style.height = "";
          return;
        }

        chatWindow.style.width = "430px";
        chatWindow.style.height = "760px";
        chatWindow.style.left = "";
        chatWindow.style.top = "40px";
        chatWindow.style.right = "40px";
      }

      let dragging = false;
      let offsetX = 0;
      let offsetY = 0;
      let resizing = false;
      let startWidth = 0;
      let startHeight = 0;
      let startClientX = 0;
      let startClientY = 0;

      function handlePointerDown(event) {
        if (!desktopMedia.matches) {
          return;
        }

        const rect = chatWindow.getBoundingClientRect();
        dragging = true;
        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;
        dragHandle.classList.add("dragging");
        chatWindow.style.left = rect.left + "px";
        chatWindow.style.top = rect.top + "px";
        chatWindow.style.right = "auto";
        dragHandle.setPointerCapture(event.pointerId);
      }

      function handlePointerMove(event) {
        if (!dragging || !desktopMedia.matches) {
          return;
        }

        const nextLeft = clamp(event.clientX - offsetX, 12, window.innerWidth - chatWindow.offsetWidth - 12);
        const nextTop = clamp(event.clientY - offsetY, 12, window.innerHeight - chatWindow.offsetHeight - 12);

        chatWindow.style.left = nextLeft + "px";
        chatWindow.style.top = nextTop + "px";
      }

      function stopDragging(event) {
        if (!dragging) {
          return;
        }

        dragging = false;
        dragHandle.classList.remove("dragging");

        if (event && typeof dragHandle.releasePointerCapture === "function") {
          try {
            dragHandle.releasePointerCapture(event.pointerId);
          } catch (error) {
            // Ignore release failures.
          }
        }
      }

      function handleResizePointerDown(event) {
        if (!desktopMedia.matches) {
          return;
        }

        const rect = chatWindow.getBoundingClientRect();
        resizing = true;
        startWidth = rect.width;
        startHeight = rect.height;
        startClientX = event.clientX;
        startClientY = event.clientY;
        chatWindow.style.left = rect.left + "px";
        chatWindow.style.top = rect.top + "px";
        chatWindow.style.right = "auto";
        resizeHandle.setPointerCapture(event.pointerId);
      }

      function handleResizePointerMove(event) {
        if (!resizing || !desktopMedia.matches) {
          return;
        }

        const rect = chatWindow.getBoundingClientRect();
        const minWidth = 360;
        const minHeight = 520;
        const maxWidth = Math.max(minWidth, window.innerWidth - rect.left - 12);
        const maxHeight = Math.max(minHeight, window.innerHeight - rect.top - 12);
        const nextWidth = clamp(startWidth + (event.clientX - startClientX), minWidth, maxWidth);
        const nextHeight = clamp(startHeight + (event.clientY - startClientY), minHeight, maxHeight);

        chatWindow.style.width = nextWidth + "px";
        chatWindow.style.height = nextHeight + "px";
      }

      function stopResizing(event) {
        if (!resizing) {
          return;
        }

        resizing = false;

        if (event && typeof resizeHandle.releasePointerCapture === "function") {
          try {
            resizeHandle.releasePointerCapture(event.pointerId);
          } catch (error) {
            // Ignore release failures.
          }
        }
      }

      dragHandle.addEventListener("pointerdown", handlePointerDown);
      dragHandle.addEventListener("pointermove", handlePointerMove);
      dragHandle.addEventListener("pointerup", stopDragging);
      dragHandle.addEventListener("pointercancel", stopDragging);
      resizeHandle.addEventListener("pointerdown", handleResizePointerDown);
      resizeHandle.addEventListener("pointermove", handleResizePointerMove);
      resizeHandle.addEventListener("pointerup", stopResizing);
      resizeHandle.addEventListener("pointercancel", stopResizing);
      resetButton.addEventListener("click", resetWindow);

      window.addEventListener("resize", function () {
        syncEmbeddedRoot();

        if (!desktopMedia.matches) {
          chatWindow.style.left = "";
          chatWindow.style.top = "";
          chatWindow.style.right = "";
          return;
        }

        chatWindow.style.width =
          clamp(chatWindow.offsetWidth, 360, window.innerWidth - 24) + "px";
        chatWindow.style.height =
          clamp(chatWindow.offsetHeight, 520, window.innerHeight - 24) + "px";

        const rect = chatWindow.getBoundingClientRect();
        chatWindow.style.left =
          clamp(rect.left, 12, window.innerWidth - chatWindow.offsetWidth - 12) + "px";
        chatWindow.style.top =
          clamp(rect.top, 12, window.innerHeight - chatWindow.offsetHeight - 12) + "px";
        chatWindow.style.right = "auto";
      });
    </script>
  </body>
</html>

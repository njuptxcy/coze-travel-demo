<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商旅费控智能体 Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 188, 137, 0.22), transparent 25%),
          linear-gradient(180deg, #f7f1e8 0%, #efe8dc 100%);
      }

      #coze-chat-sdk {
        min-height: 100vh;
      }

      .drag-tip {
        position: fixed;
        left: 16px;
        bottom: 16px;
        z-index: 10;
        max-width: min(320px, calc(100vw - 32px));
        padding: 12px 14px;
        border: 1px solid rgba(34, 35, 40, 0.08);
        border-radius: 16px;
        color: #594f42;
        background: rgba(255, 252, 246, 0.86);
        box-shadow: 0 16px 30px rgba(39, 33, 26, 0.1);
        font-size: 13px;
        line-height: 1.6;
        backdrop-filter: blur(12px);
      }

      .drag-tip strong {
        display: block;
        margin-bottom: 4px;
        color: #2a241d;
        font-size: 14px;
      }

      .drag-handle-mark {
        position: absolute;
        top: 0;
        left: 0;
        width: calc(100% - 92px);
        height: 58px;
        z-index: 2147483646;
        cursor: grab;
        background: transparent;
        touch-action: none;
      }

      .drag-handle-mark.dragging {
        cursor: grabbing;
      }

      @media (max-width: 768px) {
        .drag-tip {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="coze-chat-sdk"></div>
    <div class="drag-tip">
      <strong>当前先只处理拖动</strong>
      按住聊天框顶部左侧标题区域即可拖动。右上角按钮仍然保留原来的点击功能。
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
    <script>
      const mountEl = document.getElementById("coze-chat-sdk");
      const sdk = window.CozeWebSDK || window.CozeWebSDKmain;

      if (!sdk || !sdk.WebChatClient) {
        mountEl.innerHTML =
          '<div style="padding:24px;color:#8b4b15;">Chat SDK 加载失败，请检查网络或浏览器控制台。</div>';
        throw new Error("Coze Chat SDK is not available on window.");
      }

      const chatClient = new sdk.WebChatClient({
        config: {
          bot_id: "7622561335737532470",
        },
        componentProps: {
          title: "商旅费控智能体",
        },
        auth: {
          type: "token",
          token: "pat_orpMRBmtF3AxM0MemoyRUUiIF4BoN1qVmvRyoKAlOcd4Ci3c0jpv9pE5JnT82H1c",
          onRefreshToken: function () {
            return "pat_orpMRBmtF3AxM0MemoyRUUiIF4BoN1qVmvRyoKAlOcd4Ci3c0jpv9pE5JnT82H1c";
          },
        },
        el: mountEl,
      });

      if (chatClient && typeof chatClient.showChatBot === "function") {
        chatClient.showChatBot();
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getNearestDraggableRoot(marker) {
        let node = marker;

        while (node && node !== document.body) {
          const rect = node.getBoundingClientRect();
          const style = window.getComputedStyle(node);
          const isLargeEnough = rect.width > 280 && rect.height > 360;
          const isFloating = style.position === "fixed" || style.position === "absolute";

          if (isLargeEnough && isFloating) {
            return node;
          }

          node = node.parentElement;
        }

        return null;
      }

      function findSdkPanel() {
        const allNodes = Array.from(document.querySelectorAll("body *"));
        const marker = allNodes.find(function (node) {
          const text = (node.textContent || "").trim();
          return (
            text.includes("web_sdk_official_banner") ||
            text.includes("chatInputPlaceholder") ||
            text.includes("商旅费控agent")
          );
        });

        if (marker) {
          const root = getNearestDraggableRoot(marker);
          if (root) {
            return root;
          }
        }

        const floatingCandidates = allNodes.filter(function (node) {
          const rect = node.getBoundingClientRect();
          const style = window.getComputedStyle(node);
          return (
            (style.position === "fixed" || style.position === "absolute") &&
            rect.width > 280 &&
            rect.height > 360 &&
            rect.top < window.innerHeight &&
            rect.left < window.innerWidth
          );
        });

        floatingCandidates.sort(function (a, b) {
          const aRect = a.getBoundingClientRect();
          const bRect = b.getBoundingClientRect();
          return aRect.width * aRect.height - bRect.width * bRect.height;
        });

        return floatingCandidates[0] || null;
      }

      function installDrag(root) {
        if (!root || root.dataset.dragInstalled === "1") {
          return;
        }

        root.dataset.dragInstalled = "1";

        const rect = root.getBoundingClientRect();
        root.style.position = "fixed";
        root.style.left = clamp(rect.left, 12, window.innerWidth - rect.width - 12) + "px";
        root.style.top = clamp(rect.top, 12, window.innerHeight - rect.height - 12) + "px";
        root.style.right = "auto";
        root.style.bottom = "auto";
        root.style.margin = "0";
        root.style.transform = "none";
        root.style.zIndex = "2147483645";

        const handle = document.createElement("div");
        handle.className = "drag-handle-mark";
        root.appendChild(handle);

        let dragging = false;
        let offsetX = 0;
        let offsetY = 0;

        function movePanel(clientX, clientY) {
          const panelWidth = root.offsetWidth;
          const panelHeight = root.offsetHeight;
          const nextLeft = clamp(clientX - offsetX, 12, window.innerWidth - panelWidth - 12);
          const nextTop = clamp(clientY - offsetY, 12, window.innerHeight - panelHeight - 12);

          root.style.left = nextLeft + "px";
          root.style.top = nextTop + "px";
        }

        handle.addEventListener("pointerdown", function (event) {
          const currentRect = root.getBoundingClientRect();
          dragging = true;
          offsetX = event.clientX - currentRect.left;
          offsetY = event.clientY - currentRect.top;
          handle.classList.add("dragging");
          handle.setPointerCapture(event.pointerId);
        });

        handle.addEventListener("pointermove", function (event) {
          if (!dragging) {
            return;
          }

          movePanel(event.clientX, event.clientY);
        });

        function stopDragging(event) {
          if (!dragging) {
            return;
          }

          dragging = false;
          handle.classList.remove("dragging");

          if (event && typeof handle.releasePointerCapture === "function") {
            try {
              handle.releasePointerCapture(event.pointerId);
            } catch (error) {
              // Ignore release failures.
            }
          }
        }

        handle.addEventListener("pointerup", stopDragging);
        handle.addEventListener("pointercancel", stopDragging);

        window.addEventListener("resize", function () {
          const currentRect = root.getBoundingClientRect();
          root.style.left =
            clamp(currentRect.left, 12, window.innerWidth - root.offsetWidth - 12) + "px";
          root.style.top =
            clamp(currentRect.top, 12, window.innerHeight - root.offsetHeight - 12) + "px";
        });
      }

      function tryEnableDragging() {
        const sdkPanel = findSdkPanel();
        if (sdkPanel) {
          installDrag(sdkPanel);
        }
      }

      const observer = new MutationObserver(function () {
        tryEnableDragging();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
      });

      window.setTimeout(tryEnableDragging, 600);
      window.setTimeout(tryEnableDragging, 1500);
      window.setTimeout(tryEnableDragging, 3000);
    </script>
  </body>
</html>
